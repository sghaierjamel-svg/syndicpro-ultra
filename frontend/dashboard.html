<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyndicPro Scanner — Tableau de bord</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">🔍</span>
      <div>
        <span class="brand-name">SyndicPro Scanner</span>
        <span class="brand-sub">Tableau de bord</span>
      </div>
    </div>
    <nav class="nav-links">
      <a href="/" class="nav-link">Recherche</a>
      <a href="/dashboard" class="nav-link active">Tableau de bord</a>
    </nav>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="container">

  <!-- Stats cards -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-number" id="statTotal">—</div><div class="stat-label">Total recherches</div></div>
    <div class="stat-card"><div class="stat-number" id="statFound">—</div><div class="stat-label">Contacts trouvés</div></div>
    <div class="stat-card"><div class="stat-number" id="statRate">—</div><div class="stat-label">Taux de succès</div></div>
    <div class="stat-card"><div class="stat-number" id="statConf">—</div><div class="stat-label">Confiance moy.</div></div>
  </div>

  <!-- Toolbar -->
  <div class="card" style="padding:1rem 1.5rem">
    <div class="results-toolbar">
      <select class="filter-select" id="filterSelect">
        <option value="all">Tous les résultats</option>
        <option value="found">Contacts trouvés seulement</option>
      </select>
      <a href="/export/csv" class="btn-secondary" id="exportCsvBtn">⬇ Exporter CSV</a>
      <button class="btn-danger" id="clearBtn">🗑 Vider la base</button>
      <span style="margin-left:auto;font-size:.8rem;color:#94a3b8" id="countLabel"></span>
    </div>
  </div>

  <!-- Résultats table -->
  <div class="card" style="padding:1rem 1.5rem">
    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Résidence</th>
            <th>Ville</th>
            <th>Téléphone</th>
            <th>Email</th>
            <th>Confiance</th>
            <th>Statut</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr>
            <td colspan="8">
              <div class="empty-state">
                <div class="spinner-large"></div>
                <p>Chargement…</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div style="display:flex;gap:.5rem;justify-content:center;margin-top:1rem" id="pagination"></div>
  </div>

</main>

<!-- ── FOOTER ── -->
<footer class="footer">
  <span>SyndicPro Scanner &copy; 2025</span>
  <a href="/" class="footer-link">← Nouvelle recherche</a>
</footer>

<script src="dashboard.js?v=3"></script>
</body>
</html>
